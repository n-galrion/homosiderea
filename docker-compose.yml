services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: homosideria
    command: mongod --setParameter diagnosticDataCollectionEnabled=false --quiet

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  homosideria:
    build:
      context: .
      target: server
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
      - redis
    env_file: .env.server
    environment:
      MONGODB_URI: mongodb://mongodb:27017/homosideria
      REDIS_URL: redis://redis:6379
    restart: unless-stopped

  # Scale horizontally: docker compose up --scale agent-worker=5
  agent-worker:
    build:
      context: .
      target: worker
    depends_on:
      - mongodb
      - redis
      - homosideria
    env_file: .env.worker
    environment:
      MONGODB_URI: mongodb://mongodb:27017/homosideria
      REDIS_URL: redis://redis:6379
      GAME_API_URL: http://homosideria:3001
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
